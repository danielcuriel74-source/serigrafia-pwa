<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1f6a5a" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <title>Login | SerigrafiaApp</title>
  <style>
    :root {
      --bg: #f6f3ee;
      --panel: #fffdf9;
      --text: #1f1c19;
      --muted: #6a5f55;
      --accent: #c5542f;
      --accent-2: #1f6a5a;
      --border: #e2d6c8;
      --danger: #a52a2a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background:
        radial-gradient(circle at 20% 20%, #edd6bf 0%, transparent 45%),
        radial-gradient(circle at 80% 0%, #d9efe9 0%, transparent 38%),
        var(--bg);
      display: grid;
      place-items: center;
      color: var(--text);
      padding: 20px;
    }

    .card {
      width: min(420px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    .brand {
      margin-bottom: 14px;
      display: grid;
      place-items: center;
    }

    .brand img {
      width: min(300px, 100%);
      height: auto;
      display: block;
      object-fit: contain;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 1.65rem;
    }

    .sub {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 12px;
      margin-bottom: 14px;
      font-size: 0.98rem;
      background: white;
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 10px;
      padding: 12px;
      font-size: 0.98rem;
      font-weight: 600;
      cursor: pointer;
      color: white;
      background: linear-gradient(120deg, var(--accent), var(--accent-2));
    }

    .btn-test {
      margin-top: 10px;
      background: #2f4f4f;
    }

    .quick-grid {
      margin-top: 10px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .btn-admin {
      background: #1f6a5a;
    }

    .btn-editor {
      background: #2f4f8a;
    }

    .btn-op {
      background: #5d6472;
    }

    .msg {
      margin-top: 14px;
      min-height: 22px;
      font-size: 0.9rem;
    }

    .ok {
      color: var(--accent-2);
    }

    .err {
      color: var(--danger);
    }

    .hint {
      margin-top: 14px;
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.4;
    }

    code {
      background: #f1e5d8;
      border-radius: 6px;
      padding: 2px 6px;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="brand">
      <img src="/logo-serigrafiapp.jpg" alt="Logo SerigrafiApp" />
    </div>
    <h1>SerigrafiaApp</h1>
    <p class="sub">Inicia sesion para entrar al panel de serigrafia.</p>

    <form id="loginForm">
      <label for="email">Correo</label>
      <input id="email" type="email" required placeholder="usuario@ejemplo.com" />

      <label for="password">Contrasena</label>
      <input id="password" type="password" required placeholder="********" />

      <button type="submit">Entrar</button>
    </form>

    <div id="msg" class="msg"></div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAsNlGwwhMbuTgYVJjFc0_ry23Mf9GkmbY",
      authDomain: "serigrafiapp-72a1c.firebaseapp.com",
      projectId: "serigrafiapp-72a1c",
      storageBucket: "serigrafiapp-72a1c.firebasestorage.app",
      messagingSenderId: "543239645171",
      appId: "1:543239645171:web:f3283714ee7c3063e41486"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // Si ya hay sesion activa redirigir al panel
    auth.onAuthStateChanged((firebaseUser) => {
      if (firebaseUser) {
        window.location.href = '/panel.html';
      }
    });

    const form = document.getElementById('loginForm');
    const msg = document.getElementById('msg');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      msg.className = 'msg';
      msg.textContent = 'Validando...';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      try {
        const cred = await auth.signInWithEmailAndPassword(email, password);
        const uid = cred.user.uid;

        let userData;
        try {
          const docSnap = await db.collection('usuarios').doc(uid).get();
          if (docSnap.exists) {
            const data = docSnap.data();
            userData = {
              id: uid,
              nombre: data.nombre || cred.user.displayName || email.split('@')[0],
              email: cred.user.email,
              roles: Array.isArray(data.roles) ? data.roles : ['op']
            };
          } else {
            userData = {
              id: uid,
              nombre: cred.user.displayName || email.split('@')[0],
              email: cred.user.email,
              roles: ['op']
            };
          }
        } catch (_e) {
          userData = {
            id: uid,
            nombre: cred.user.displayName || email.split('@')[0],
            email: cred.user.email,
            roles: ['op']
          };
        }

        localStorage.setItem('serigrafia_user', JSON.stringify(userData));
        msg.classList.add('ok');
        msg.textContent = 'Bienvenido ' + userData.nombre + '. Redirigiendo...';
        setTimeout(() => {
          window.location.href = '/panel.html';
        }, 500);
      } catch (_error) {
        msg.classList.add('err');
        msg.textContent = 'Correo o contrasena incorrectos.';
      }
    });
  </script>
  <script src="/pwa-register.js"></script>
</body>
</html>
